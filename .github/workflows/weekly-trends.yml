name: Weekly Google Trends Report

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  trends-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install Chromium and chromedriver
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver || sudo apt-get install -y chromium chromium-driver

      - name: Install dependencies
        run: uv sync

      - name: Run trends bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -eux
          export CHROMEDRIVER="$(command -v chromedriver || command -v chromium-chromedriver)"
          uv run trends-bot

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trend-artifacts
          path: artifacts/
          if-no-files-found: ignore
