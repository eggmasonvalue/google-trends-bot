name: Weekly Google Trends Report

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  trends-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Run trends bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TRENDS_KEYWORD: ${{ vars.TRENDS_KEYWORD || 'multibagger stock' }}
          TRENDS_GEO: ${{ vars.TRENDS_GEO || 'IN' }}
          TRENDS_CATEGORY: ${{ vars.TRENDS_CATEGORY || '7' }}
        run: uv run trends-bot

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trend-artifacts
          path: artifacts/
          if-no-files-found: ignore
